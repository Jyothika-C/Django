{% extends 'app/base.html' %}

{% block title %}
Home
{% endblock %}

{% block content %}

<div class="form-container">

    <div class="form-box">

        <h2>Student Registration</h2>

        <form method="POST">

            {% csrf_token %}

            <div class="form-group">

                <label>Student Reg. No.</label>

                <input type="text">

            </div>

            <div class="form-group">

                <label>Name</label>

                <input type="text">

            </div>

            <div class="form-group">

                <label>Program Level</label>

                <select>

                    <option>Select Level</option>
                    <option>UG</option>
                    <option>PG</option>

                </select>

            </div>

            <div class="buttons">

                <button type="submit" class="save-btn">
                    Save Student
                </button>

            </div>

        </form>

    </div>

</div>

{% endblock %}
