{% extends 'app/base.html' %}

{% block title %}
Delete Student
{% endblock %}

{% block content %}

<div class="page-box">

    <h1>Delete Student</h1>

    <p>
        Are you sure you want to delete
        <strong>{{ student.name }}</strong> ?
    </p>

    <form method="POST">

        {% csrf_token %}

        <button type="submit" class="delete-btn">
            Delete
        </button>

    </form>

</div>

{% endblock %}
