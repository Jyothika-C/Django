<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <title>Add Student</title>

    <style>

        body{
            background: #f4f4f4;
            font-family: Arial;
        }

        .container{
            width: 400px;
            background: white;
            margin: 50px auto;
            padding: 30px;
            border-radius: 10px;
        }

        h2{
            text-align: center;
        }

        input{
            width: 100%;
            padding: 10px;
            margin-top: 10px;
        }

        button{
            background: blue;
            color: white;
            padding: 10px 20px;
            border: none;
            margin-top: 15px;
            cursor: pointer;
        }

    </style>

</head>

<body>

    <div class="container">

        <h2>Add Student</h2>

        <form method="POST">

            {% csrf_token %}

            {{ form.as_p }}

            <button type="submit">
                Save Student
            </button>

        </form>

    </div>

</body>
</html>
