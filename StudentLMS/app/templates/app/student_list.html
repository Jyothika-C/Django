<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <title>Student List</title>

    <style>

        body{
            font-family: Arial;
            background: #f4f4f4;
            margin: 0;
        }

        .navbar{
            background: #222;
            padding: 15px;
        }

        .navbar a{
            color: white;
            text-decoration: none;
            margin-right: 20px;
        }

        .container{
            width: 80%;
            margin: auto;
            margin-top: 30px;
        }

        h1{
            text-align: center;
        }

        .btn{
            background: blue;
            color: white;
            padding: 10px 15px;
            text-decoration: none;
            border-radius: 5px;
        }

        table{
            width: 100%;
            border-collapse: collapse;
            background: white;
            margin-top: 20px;
        }

        th, td{
            border: 1px solid #ccc;
            padding: 12px;
            text-align: center;
        }

        th{
            background: #eee;
        }

    </style>

</head>

<body>

    <div class="navbar">

        <a href="{% url 'student_list' %}">
            Home
        </a>

        <a href="{% url 'add_student' %}">
            Add Student
        </a>

    </div>

    <div class="container">

        <h1>Student List</h1>

        <a href="{% url 'add_student' %}" class="btn">
            Add Student
        </a>

        <table>

            <tr>

                <th>ID</th>
                <th>Name</th>
                <th>Email</th>
                <th>Course</th>
                <th>Enroll Date</th>

            </tr>

            {% for student in students %}

            <tr>

                <td>{{ student.id }}</td>
                <td>{{ student.name }}</td>
                <td>{{ student.email }}</td>
                <td>{{ student.course }}</td>
                <td>{{ student.enroll_date }}</td>

            </tr>

            {% endfor %}

        </table>

    </div>

</body>
</html>
