{% extends 'base.html' %}

{% block content %}

<style>

    .main-container{
        padding:20px;
    }

    .page-title{
        display:flex;
        justify-content:space-between;
        align-items:center;
        margin-bottom:30px;
    }

    .allocation-card{
        background:white;
        padding:25px;
        border-radius:15px;
        box-shadow:0px 4px 10px rgba(0,0,0,0.1);
    }

    .table{
        margin-top:20px;
    }

    .btn{
        transition:0.3s;
    }

    .btn:hover{
        transform:scale(1.05);
    }

    .table-hover tbody tr:hover{
        background:#f1f5f9;
    }

    .status-badge{
        font-size:14px;
        padding:6px 12px;
        border-radius:20px;
    }

    .action-btn{
        width:90px;
    }

</style>

<div class="main-container">

    <!-- Heading -->

    <div class="page-title">

        <div>

            <h2>

                <i class="fa fa-building"></i>

                Room Allocation

            </h2>

            <p class="text-muted">

                Manage hostel room allocations

            </p>

        </div>

        <button class="btn btn-primary">

            <i class="fa fa-plus"></i>

            Allocate Room

        </button>

    </div>

    <!-- Allocation Table -->

    <div class="allocation-card">

        <table class="table table-bordered table-hover">

            <thead class="table-dark">

                <tr>

                    <th>Allocation ID</th>
                    <th>Student Name</th>
                    <th>Room No</th>
                    <th>Bed No</th>
                    <th>Allocation Date</th>
                    <th>Status</th>
                    <th>Actions</th>

                </tr>

            </thead>

            <tbody>

                <tr>

                    <td>1</td>
                    <td>Rahul</td>
                    <td>101</td>
                    <td>B1</td>
                    <td>10-May-2026</td>

                    <td>

                        <span class="badge bg-success status-badge">

                            Allocated

                        </span>

                    </td>

                    <td>

                        <div class="d-flex gap-2">

                            <button class="btn btn-success btn-sm action-btn">

                                <i class="fa fa-edit"></i>

                                Edit

                            </button>

                            <button class="btn btn-danger btn-sm action-btn">

                                <i class="fa fa-trash"></i>

                                Remove

                            </button>

                        </div>

                    </td>

                </tr>

                <tr>

                    <td>2</td>
                    <td>Anjali</td>
                    <td>102</td>
                    <td>B2</td>
                    <td>09-May-2026</td>

                    <td>

                        <span class="badge bg-success status-badge">

                            Allocated

                        </span>

                    </td>

                    <td>

                        <div class="d-flex gap-2">

                            <button class="btn btn-success btn-sm action-btn">

                                <i class="fa fa-edit"></i>

                                Edit

                            </button>

                            <button class="btn btn-danger btn-sm action-btn">

                                <i class="fa fa-trash"></i>

                                Remove

                            </button>

                        </div>

                    </td>

                </tr>

                <tr>

                    <td>3</td>
                    <td>Priya</td>
                    <td>201</td>
                    <td>B4</td>
                    <td>08-May-2026</td>

                    <td>

                        <span class="badge bg-warning text-dark status-badge">

                            Pending

                        </span>

                    </td>

                    <td>

                        <div class="d-flex gap-2">

                            <button class="btn btn-success btn-sm action-btn">

                                <i class="fa fa-edit"></i>

                                Edit

                            </button>

                            <button class="btn btn-danger btn-sm action-btn">

                                <i class="fa fa-trash"></i>

                                Remove

                            </button>

                        </div>

                    </td>

                </tr>

            </tbody>

        </table>

    </div>

</div>

{% endblock %}
