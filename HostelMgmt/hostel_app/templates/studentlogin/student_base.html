<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Student Panel</title>

    <!-- Bootstrap -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- Font Awesome -->

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>

        body{
            background:#f4f6f9;
            font-family:Arial, sans-serif;
        }

        /* Navbar */

        .topbar{
            background:white;
            padding:15px 25px;
            box-shadow:0px 2px 10px rgba(0,0,0,0.1);

            display:flex;
            justify-content:space-between;
            align-items:center;
        }

        .nav-links{
            display:flex;
            gap:25px;
        }

        .nav-links a{
            text-decoration:none;
            color:#1e293b;
            font-weight:600;
            transition:0.3s;
        }

        .nav-links a:hover{
            color:#2563eb;
        }

        .student-logo{
            display:flex;
            align-items:center;
            gap:10px;
        }

        .main-content{
            padding:30px;
        }

    </style>

</head>

<body>

    <!-- Navbar -->

    <div class="topbar">

        <!-- Left Logo -->

        <div class="student-logo">

            <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png"
                 width="45"
                 height="45"
                 class="rounded-circle">

            <h4 class="mb-0">Student Panel</h4>

        </div>

        <!-- Center Links -->

        <div class="nav-links">

            <a href="/student-dashboard/">

                <i class="fa fa-house"></i>

                Dashboard

            </a>

            <a href="{% url 'profile' %}">

                <i class="fa fa-user"></i>

                Profile

            </a>

            <a href="{% url 'room' %}">

                <i class="fa fa-bed"></i>

                Room

            </a>

            <a href="{% url 'fees_student' %}">

                <i class="fa fa-money-bill"></i>

                Fees

            </a>

            <a href="{% url 'complaints_student' %}">

                <i class="fa fa-comment"></i>

                Complaints

            </a>

        </div>

        <!-- Right Side -->

        <div class="d-flex align-items-center gap-3">

            <span class="fw-bold">

                Welcome Student

            </span>

            <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png"
                 width="45"
                 height="45"
                 class="rounded-circle">

        </div>

    </div>

    <!-- Dynamic Page Content -->

    <div class="main-content">

        {% block content %}

        {% endblock %}

    </div>

</body>

</html>
