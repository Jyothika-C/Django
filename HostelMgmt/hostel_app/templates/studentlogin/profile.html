{% extends 'studentlogin/student_base.html' %}

{% block content %}

<style>

    .profile-container{
        background:white;
        padding:35px;
        border-radius:20px;
        box-shadow:0px 4px 12px rgba(0,0,0,0.1);
        max-width:800px;
        margin:auto;
    }

    .profile-header{
        text-align:center;
        margin-bottom:30px;
    }

    .profile-header img{
        width:120px;
        height:120px;
        border-radius:50%;
        border:4px solid #2563eb;
    }

    .profile-header h2{
        margin-top:15px;
    }

    .info-grid{
        display:grid;
        grid-template-columns:1fr 1fr;
        gap:20px;
    }

    .info-box{
        background:#f8fafc;
        padding:15px;
        border-radius:12px;
    }

    .info-box label{
        font-size:14px;
        color:#64748b;
    }

    .info-box p{
        font-size:18px;
        font-weight:600;
        margin:5px 0 0;
    }

</style>

<div class="profile-container">

    <!-- Profile Image + Name -->

    <div class="profile-header">

        <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png">

        <h2>Student Name</h2>

        <p class="text-muted">Student Profile Details</p>

    </div>

    <!-- Details Grid -->

    <div class="info-grid">

        <div class="info-box">
            <label>Student ID</label>
            <p>STU001</p>
        </div>

        <div class="info-box">
            <label>Roll Number</label>
            <p>22MCA101</p>
        </div>

        <div class="info-box">
            <label>Course</label>
            <p>MCA</p>
        </div>

        <div class="info-box">
            <label>Contact</label>
            <p>9876543210</p>
        </div>

        <div class="info-box">
            <label>Email</label>
            <p>student@gmail.com</p>
        </div>

        <div class="info-box">
            <label>Room Number</label>
            <p>101</p>
        </div>

    </div>

</div>

{% endblock %}
