{% extends 'base.html' %}

{% block content %}

<style>

    .main-container{
        padding:20px;
    }

    .page-title{
        display:flex;
        justify-content:space-between;
        align-items:center;
        margin-bottom:30px;
    }

    .student-card{
        background:white;
        padding:25px;
        border-radius:15px;
        box-shadow:0px 4px 10px rgba(0,0,0,0.1);
    }

    .table{
        margin-top:20px;
    }

    .btn{
        transition:0.3s;
    }

    .btn:hover{
        transform:scale(1.05);
    }

    .table-hover tbody tr:hover{
        background:#f1f5f9;
    }

</style>

<div class="main-container">

    <!-- Heading -->

    <div class="page-title">

        <div>

            <h2>

                <i class="fa fa-user-graduate"></i>

                Student Management

            </h2>

            <p class="text-muted">

                Manage hostel students details

            </p>

        </div>

        <button class="btn btn-primary">

            <i class="fa fa-plus"></i>

            Add Student

        </button>

    </div>

    <!-- Student Table -->

    <div class="student-card">

        <table class="table table-bordered table-hover">

            <thead class="table-dark">

                <tr>

                    <th>ID</th>
                    <th>Name</th>
                    <th>Room No</th>
                    <th>Department</th>
                    <th>Phone</th>
                    <th>Status</th>
                    <th>Actions</th>

                </tr>

            </thead>

            <tbody>

                <tr>

                    <td>1</td>
                    <td>Rahul</td>
                    <td>101</td>
                    <td>MCA</td>
                    <td>9876543210</td>

                    <td>

                        <span class="badge bg-success">

                            Active

                        </span>

                    </td>

                    <td>

                        <button class="btn btn-success btn-sm">

                            <i class="fa fa-edit"></i>

                            Edit

                        </button>

                        <button class="btn btn-danger btn-sm">

                            <i class="fa fa-trash"></i>

                            Delete

                        </button>

                    </td>

                </tr>

                <tr>

                    <td>2</td>
                    <td>Anjali</td>
                    <td>102</td>
                    <td>BTech</td>
                    <td>9876501234</td>

                    <td>

                        <span class="badge bg-success">

                            Active

                        </span>

                    </td>

                    <td>

                        <button class="btn btn-success btn-sm">

                            <i class="fa fa-edit"></i>

                            Edit

                        </button>

                        <button class="btn btn-danger btn-sm">

                            <i class="fa fa-trash"></i>

                            Delete

                        </button>

                    </td>

                </tr>

                <tr>

                    <td>3</td>
                    <td>Priya</td>
                    <td>103</td>
                    <td>BSc</td>
                    <td>9123456780</td>

                    <td>

                        <span class="badge bg-warning text-dark">

                            Pending

                        </span>

                    </td>

                    <td>

                        <button class="btn btn-success btn-sm">

                            <i class="fa fa-edit"></i>

                            Edit

                        </button>

                        <button class="btn btn-danger btn-sm">

                            <i class="fa fa-trash"></i>

                            Delete

                        </button>

                    </td>

                </tr>

            </tbody>

        </table>

    </div>

</div>

{% endblock %}
