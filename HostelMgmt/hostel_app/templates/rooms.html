{% extends 'base.html' %}

{% block content %}

<style>

    .main-container{
        padding:20px;
    }

    .page-title{
        display:flex;
        justify-content:space-between;
        align-items:center;
        margin-bottom:30px;
    }

    .room-card{
        background:white;
        padding:25px;
        border-radius:15px;
        box-shadow:0px 4px 10px rgba(0,0,0,0.1);
    }

    .table{
        margin-top:20px;
    }

    .btn{
        transition:0.3s;
    }

    .btn:hover{
        transform:scale(1.05);
    }

    .table-hover tbody tr:hover{
        background:#f1f5f9;
    }

    .room-status{
        font-size:14px;
        padding:6px 12px;
        border-radius:20px;
    }

</style>

<div class="main-container">

    <!-- Heading -->

    <div class="page-title">

        <div>

            <h2>

                <i class="fa fa-bed"></i>

                Room Management

            </h2>

            <p class="text-muted">

                Manage hostel room details

            </p>

        </div>

        <button class="btn btn-primary">

            <i class="fa fa-plus"></i>

            Add Room

        </button>

    </div>

    <!-- Room Table -->

    <div class="room-card">

        <table class="table table-bordered table-hover">

            <thead class="table-dark">

                <tr>

                    <th>Room No</th>
                    <th>Floor</th>
                    <th>Capacity</th>
                    <th>Occupied</th>
                    <th>Available Beds</th>
                    <th>Status</th>
                    <th>Actions</th>

                </tr>

            </thead>

            <tbody>

                <tr>

                    <td>101</td>
                    <td>1st Floor</td>
                    <td>4</td>
                    <td>3</td>
                    <td>1</td>

                    <td>

                        <span class="badge bg-success room-status">

                            Available

                        </span>

                    </td>

                    <td>

                        <button class="btn btn-success btn-sm">

                            <i class="fa fa-edit"></i>

                            Edit

                        </button>

                        <button class="btn btn-danger btn-sm">

                            <i class="fa fa-trash"></i>

                            Delete

                        </button>

                    </td>

                </tr>

                <tr>

                    <td>102</td>
                    <td>1st Floor</td>
                    <td>4</td>
                    <td>4</td>
                    <td>0</td>

                    <td>

                        <span class="badge bg-danger room-status">

                            Full

                        </span>

                    </td>

                    <td>

                        <button class="btn btn-success btn-sm">

                            <i class="fa fa-edit"></i>

                            Edit

                        </button>

                        <button class="btn btn-danger btn-sm">

                            <i class="fa fa-trash"></i>

                            Delete

                        </button>

                    </td>

                </tr>

                <tr>

                    <td>201</td>
                    <td>2nd Floor</td>
                    <td>6</td>
                    <td>2</td>
                    <td>4</td>

                    <td>

                        <span class="badge bg-warning text-dark room-status">

                            Partially Filled

                        </span>

                    </td>

                    <td>

                        <button class="btn btn-success btn-sm">

                            <i class="fa fa-edit"></i>

                            Edit

                        </button>

                        <button class="btn btn-danger btn-sm">

                            <i class="fa fa-trash"></i>

                            Delete

                        </button>

                    </td>

                </tr>

            </tbody>

        </table>

    </div>

</div>

{% endblock %}
